<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Petey</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; max-width: 900px;
         margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
  h1 { margin-bottom: 0.25rem; }
  .subtitle { color: #666; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
  .subtitle a { color: #2563eb; text-decoration: none; font-size: 14px; }
  .subtitle a:hover { text-decoration: underline; }

  .dropzone {
    border: 2px dashed #adb5bd; border-radius: 8px; padding: 2.5rem;
    text-align: center; color: #666; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 1.5rem;
  }
  .dropzone.over { border-color: #228be6; background: #e7f5ff; }
  .dropzone.has-file { border-color: #51cf66; background: #ebfbee; color: #2b8a3e; }
  .dropzone input { display: none; }

  .controls { display: flex; gap: 1rem; align-items: center;
              margin-bottom: 1.5rem; flex-wrap: wrap; }
  .controls label { font-weight: 600; }
  .controls select, .controls input[type=text] {
    padding: 0.4rem 0.6rem; font-size: 0.95rem; border: 1px solid #ccc;
    border-radius: 4px;
  }
  .toggle-group { display: flex; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
  .toggle-group button {
    padding: 0.4rem 1rem; border: none; background: #fff; cursor: pointer;
    font-size: 0.9rem; transition: background 0.15s;
  }
  .toggle-group button.active { background: #228be6; color: #fff; }

  .schema-section { margin-bottom: 1.5rem; }
  .schema-section h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
  .field-row {
    display: grid; grid-template-columns: 24px 1fr 120px 2fr 30px;
    gap: 0.5rem; align-items: center; margin-bottom: 0.4rem;
  }
  .field-row input[type=text], .field-row select {
    padding: 0.35rem 0.5rem; font-size: 0.9rem; border: 1px solid #ccc;
    border-radius: 4px; width: 100%;
  }
  .field-row input[type=checkbox] { width: 16px; height: 16px; margin: 0; cursor: pointer; }
  .field-row .remove-btn {
    background: none; border: none; color: #e03131; cursor: pointer;
    font-size: 1.2rem; padding: 0;
  }
  .field-row.disabled input[type=text], .field-row.disabled select {
    opacity: 0.4; pointer-events: none;
  }
  .enum-values {
    grid-column: 1 / -1; margin-left: 0.5rem; margin-bottom: 0.5rem;
  }
  .enum-values input {
    padding: 0.3rem 0.5rem; font-size: 0.85rem; border: 1px solid #ddd;
    border-radius: 4px; width: 100%;
  }
  .enum-values label { font-size: 0.8rem; color: #666; }

  .add-btn, .extract-btn, .save-btn {
    padding: 0.5rem 1.2rem; border: none; border-radius: 4px;
    cursor: pointer; font-size: 0.95rem;
  }
  .add-btn { background: #e7f5ff; color: #228be6; }
  .extract-btn { background: #228be6; color: #fff; font-weight: 600; }
  .extract-btn:disabled { background: #adb5bd; cursor: not-allowed; }
  .save-btn { background: #ebfbee; color: #2b8a3e; }
  .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  #status { margin: 1rem 0; font-weight: 500; }
  pre { background: #f1f3f5; padding: 1rem; border-radius: 6px;
        overflow-x: auto; font-size: 0.85rem; }
  table.results { width: 100%; border-collapse: collapse; font-size: 0.85rem;
                  margin-top: 0.5rem; }
  table.results th, table.results td {
    border: 1px solid #dee2e6; padding: 0.4rem 0.6rem; text-align: left;
  }
  table.results th { background: #f1f3f5; position: sticky; top: 0; }
  .table-wrap { max-height: 500px; overflow: auto; border-radius: 6px;
                border: 1px solid #dee2e6; }
  .download-btn { display: inline-block; margin-top: 0.5rem; padding: 0.3rem 0.8rem;
                  background: #f1f3f5; border: 1px solid #ccc; border-radius: 4px;
                  cursor: pointer; font-size: 0.85rem; text-decoration: none; color: #1a1a1a; }

  .yaml-toggle { font-size: 0.85rem; color: #228be6; cursor: pointer;
                 background: none; border: none; padding: 0; margin-bottom: 0.5rem; }
  .instructions-area { width: 100%; min-height: 60px; font-size: 0.9rem;
               padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;
               font-family: system-ui, sans-serif; resize: vertical; }
  .instructions-section { margin-bottom: 1.5rem; }
  .instructions-section label { font-size: 0.9rem; color: #666; display: block; margin-bottom: 0.3rem; }
</style>
</head>
<body>

<style>
  .auth-bar {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 12px; margin-bottom: 0.5rem; font-size: 14px;
  }
  .auth-bar .user-email { color: #555; }
  .auth-bar button {
    padding: 6px 14px; border: 1px solid #ccc; border-radius: 6px;
    background: #f9f9f9; cursor: pointer; font-size: 13px;
  }
  .auth-bar button:hover { background: #eee; }
  .auth-bar .sign-in-btn { background: #2563eb; color: #fff; border: none; }
  .auth-bar .sign-in-btn:hover { background: #1d4ed8; }
  .auth-overlay {
    position: fixed; inset: 0; background: rgba(255,255,255,0.95);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; flex-direction: column; gap: 1rem;
  }
  .auth-overlay h2 { margin: 0; }
  .auth-overlay p { color: #666; margin: 0; }
</style>

<div class="auth-bar" id="authBar" style="display:none;">
  <span class="user-email" id="userEmail"></span>
  <button id="signOutBtn" style="display:none;">Sign out</button>
  <button id="signInBtn" class="sign-in-btn" style="display:none;">Sign in with Google</button>
</div>

<div class="auth-overlay" id="authOverlay">
  <h2>Petey</h2>
  <p>Sign in to get started</p>
  <button id="overlaySignIn" class="sign-in-btn" style="padding:10px 24px; font-size:16px; border-radius:8px; border:none; background:#2563eb; color:#fff; cursor:pointer;">Sign in with Google</button>
</div>

<h1>Petey</h1>
<p class="subtitle">
  <span>The Easy PDF Extractor</span>
  <span><a href="/template-builder">Schema Builder</a> &middot; <a href="/settings/page">Settings</a></span>
</p>

<div class="dropzone" id="dropzone">
  <p id="dropLabel">Drop PDF(s) here, or click to select</p>
  <input type="file" id="fileInput" accept=".pdf" multiple>
</div>
<div style="margin-top:-1rem; margin-bottom:1.5rem; font-size:0.85rem;">
  <button id="folderBtn" style="background:none; border:none; color:#228be6; cursor:pointer; padding:0; font-size:0.85rem;">Select folder</button>
  <input type="file" id="folderInput" accept=".pdf" webkitdirectory style="display:none;">
</div>

<div class="controls">
  <label>Mode:</label>
  <div class="toggle-group" id="modeToggle">
    <button class="active" data-mode="single">Discrete queries</button>
    <button data-mode="table">Table</button>
  </div>
  <label style="margin-left:1rem;">Parser:</label>
  <select id="parserSelect">
    <option value="pymupdf">PyMuPDF (default)</option>
    <option value="docparse">DocParse</option>
  </select>
  <label style="margin-left:1rem;">Load:</label>
  <select id="loadSchema">
    <option value="">New schema</option>
  </select>
</div>

<div class="schema-section">
  <div style="display:flex; align-items:center; gap:1rem; margin-bottom:0.75rem;">
    <h2 style="margin:0;">Fields</h2>
    <input type="text" id="schemaName" placeholder="Schema name (optional)"
           style="padding:0.3rem 0.5rem; font-size:0.9rem; border:1px solid #ccc; border-radius:4px;">
  </div>
  <div id="fieldRows"></div>
  <div class="btn-row" style="margin-top:0.5rem;">
    <button class="add-btn" id="addField">+ Add field</button>
    <button class="yaml-toggle" id="yamlToggle">Import YAML</button>
  </div>
  <div id="yamlSection" style="display:none; margin-top:0.75rem;">
    <input type="file" id="yamlFile" accept=".yaml,.yml" style="margin-bottom:0.5rem; font-size:0.9rem;">
  </div>
</div>

<div class="instructions-section">
  <label for="instructions">Additional instructions (optional)</label>
  <textarea class="instructions-area" id="instructions"
    placeholder="e.g. MCI item rows appear indented below each case. Dates are in MM/DD/YYYY format."></textarea>
</div>

<div class="btn-row">
  <button class="extract-btn" id="extractBtn" disabled>Extract</button>
  <button class="save-btn" id="saveBtn">Download YAML</button>
</div>

<div id="progressArea" style="display:none; margin-top:16px;">
  <div style="display:flex; align-items:center; gap:12px; margin-bottom:8px;">
    <div style="flex:1; background:#e5e7eb; border-radius:6px; height:8px; overflow:hidden;">
      <div id="progressBar" style="height:100%; background:#228be6; border-radius:6px; width:0%; transition:width 0.3s;"></div>
    </div>
    <span id="progressPct" style="font-size:13px; color:#555; min-width:40px;">0%</span>
  </div>
  <div id="progressLog" style="font-size:12px; color:#555; max-height:120px; overflow-y:auto;"></div>
</div>
<div id="status"></div>
<div id="results"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getAuth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

// --- Firebase Auth setup ---
const cfgResp = await fetch('/firebase-config');
const firebaseConfig = await cfgResp.json();

let _currentUser = null;

if (firebaseConfig.authDisabled) {
  // Local dev mode — skip Firebase auth entirely
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('authBar').style.display = 'none';
} else {
  const firebaseApp = initializeApp(firebaseConfig);
  const auth = getAuth(firebaseApp);
  const provider = new GoogleAuthProvider();

  const signInBtn = document.getElementById('signInBtn');
  const signOutBtn = document.getElementById('signOutBtn');
  const overlaySignIn = document.getElementById('overlaySignIn');
  signInBtn.addEventListener('click', () => signInWithPopup(auth, provider));
  signOutBtn.addEventListener('click', () => signOut(auth));
  overlaySignIn.addEventListener('click', () => signInWithPopup(auth, provider));

  onAuthStateChanged(auth, user => {
    const bar = document.getElementById('authBar');
    const overlay = document.getElementById('authOverlay');
    bar.style.display = 'flex';
    _currentUser = user;
    if (user) {
      overlay.style.display = 'none';
      document.getElementById('userEmail').textContent = user.email;
      signInBtn.style.display = 'none';
      signOutBtn.style.display = '';
    } else {
      overlay.style.display = 'flex';
      document.getElementById('userEmail').textContent = '';
      signInBtn.style.display = '';
      signOutBtn.style.display = 'none';
    }
  });
}

async function authFetch(url, opts = {}) {
  if (_currentUser) {
    const token = await _currentUser.getIdToken();
    opts.headers = { ...(opts.headers || {}), 'Authorization': 'Bearer ' + token };
  }
  return fetch(url, opts);
}

// --- App logic ---
let selectedFiles = [];
let recordType = 'single';
let fields = [];

const dz = document.getElementById('dropzone');
const fi = document.getElementById('fileInput');
const folderInput = document.getElementById('folderInput');
const dropLabel = document.getElementById('dropLabel');
const st = document.getElementById('status');
const results = document.getElementById('results');
const fieldRows = document.getElementById('fieldRows');
const extractBtn = document.getElementById('extractBtn');
const loadSel = document.getElementById('loadSchema');

// Load saved schemas
authFetch('/schemas').then(r => r.json()).then(schemas => {
  schemas.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.file;
    opt.textContent = s.name;
    loadSel.appendChild(opt);
  });
});

loadSel.addEventListener('change', async () => {
  if (!loadSel.value) { fields = []; renderFields(); return; }
  const resp = await authFetch('/schemas/' + loadSel.value);
  const spec = await resp.json();
  document.getElementById('schemaName').value = spec.name || '';
  document.getElementById('instructions').value = spec.instructions || '';
  recordType = spec.record_type === 'array' ? 'table' : 'single';
  updateModeToggle();
  fields = Object.entries(spec.fields || {}).map(([name, cfg]) => ({
    name, type: cfg.type, description: cfg.description || '',
    values: (cfg.values || []).join(', '), enabled: true,
  }));
  renderFields();
});

// Mode toggle
document.getElementById('modeToggle').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  recordType = e.target.dataset.mode;
  updateModeToggle();
});

function updateModeToggle() {
  document.querySelectorAll('#modeToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === recordType);
  });
}

// File drop
dz.addEventListener('click', () => fi.click());
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  const pdfs = [...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (pdfs.length) setFiles(pdfs);
});
fi.addEventListener('change', e => {
  const pdfs = [...e.target.files].filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (pdfs.length) setFiles(pdfs);
});
document.getElementById('folderBtn').addEventListener('click', () => folderInput.click());
folderInput.addEventListener('change', e => {
  const pdfs = [...e.target.files].filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (pdfs.length) setFiles(pdfs);
});

function setFiles(files) {
  selectedFiles = files;
  dropLabel.textContent = files.length === 1 ? files[0].name : files.length + ' PDFs selected';
  dz.classList.add('has-file');
  updateExtractBtn();
}

function updateExtractBtn() {
  extractBtn.disabled = !(selectedFiles.length && fields.some(f => f.name.trim() && f.enabled));
}

// Field builder
document.getElementById('addField').addEventListener('click', () => {
  fields.push({ name: '', type: 'string', description: '', values: '', enabled: true });
  renderFields();
  const inputs = fieldRows.querySelectorAll('input[data-key="name"]');
  if (inputs.length) inputs[inputs.length - 1].focus();
});

function renderFields() {
  fieldRows.innerHTML = '';
  fields.forEach((f, i) => {
    if (f.enabled === undefined) f.enabled = true;
    const row = document.createElement('div');
    row.className = 'field-row' + (f.enabled ? '' : ' disabled');
    row.innerHTML =
      '<input type="checkbox"' + (f.enabled ? ' checked' : '') + ' data-i="' + i + '" data-key="enabled" title="Include this field">' +
      '<input type="text" placeholder="Field name" value="' + esc(f.name) + '" data-i="' + i + '" data-key="name">' +
      '<select data-i="' + i + '" data-key="type">' +
        '<option value="string"' + (f.type==='string'?' selected':'') + '>Text</option>' +
        '<option value="number"' + (f.type==='number'?' selected':'') + '>Number</option>' +
        '<option value="date"' + (f.type==='date'?' selected':'') + '>Date</option>' +
        '<option value="enum"' + (f.type==='enum'?' selected':'') + '>Enum</option>' +
      '</select>' +
      '<input type="text" placeholder="Description" value="' + esc(f.description) + '" data-i="' + i + '" data-key="description">' +
      '<button class="remove-btn" data-i="' + i + '">&times;</button>';
    fieldRows.appendChild(row);

    if (f.type === 'enum') {
      const ev = document.createElement('div');
      ev.className = 'enum-values';
      ev.innerHTML = '<label>Values (comma-separated, leave blank to infer):</label>' +
        '<input type="text" placeholder="Option A, Option B, ... (or leave blank)" value="' + esc(f.values) + '" data-i="' + i + '" data-key="values">';
      fieldRows.appendChild(ev);
    }
  });

  fieldRows.querySelectorAll('input, select').forEach(el => {
    const handler = e => {
      const idx = parseInt(e.target.dataset.i);
      if (e.target.dataset.key === 'enabled') {
        fields[idx].enabled = e.target.checked;
        renderFields();
      } else {
        fields[idx][e.target.dataset.key] = e.target.value;
        if (e.target.dataset.key === 'type') renderFields();
      }
      updateExtractBtn();
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
  fieldRows.querySelectorAll('.remove-btn').forEach(el => {
    el.addEventListener('click', e => {
      fields.splice(parseInt(e.currentTarget.dataset.i), 1);
      renderFields();
      updateExtractBtn();
    });
  });
  updateExtractBtn();
}

function esc(s) { return (s||'').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

// YAML import
document.getElementById('yamlToggle').addEventListener('click', () => {
  const sec = document.getElementById('yamlSection');
  sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('yamlFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    authFetch('/parse-yaml', { method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({yaml: reader.result})
    }).then(r => r.json()).then(spec => {
      document.getElementById('schemaName').value = spec.name || '';
      document.getElementById('instructions').value = spec.instructions || '';
      recordType = spec.record_type === 'array' ? 'table' : 'single';
      updateModeToggle();
      fields = Object.entries(spec.fields || {}).map(([name, cfg]) => ({
        name, type: cfg.type, description: cfg.description || '',
        values: (cfg.values || []).join(', '), enabled: true,
      }));
      renderFields();
      document.getElementById('yamlSection').style.display = 'none';
    }).catch(() => alert('Invalid YAML file'));
  };
  reader.readAsText(file);
});

// Build schema spec from fields (only enabled ones)
function buildSpec() {
  const spec = {};
  const name = document.getElementById('schemaName').value.trim();
  if (name) spec.name = name;
  if (recordType === 'table') spec.record_type = 'array';
  const instr = document.getElementById('instructions').value.trim();
  if (instr) spec.instructions = instr;
  spec.fields = {};
  for (const f of fields) {
    if (!f.name.trim() || !f.enabled) continue;
    const cfg = { type: f.type, description: f.description };
    if (f.type === 'enum') {
      const vals = f.values.split(',').map(v => v.trim()).filter(Boolean);
      if (vals.length) cfg.values = vals;
    }
    spec.fields[f.name.trim()] = cfg;
  }
  return spec;
}

// Extract
const CONCURRENCY = 5;

class ApiKeyError extends Error {
  constructor(msg) { super(msg); this.name = 'ApiKeyError'; }
}

async function extractFile(file, spec, instr) {
  const form = new FormData();
  form.append('file', file);
  form.append('schema_spec', JSON.stringify(spec));
  if (instr) form.append('instructions', instr);
  form.append('parser', document.getElementById('parserSelect').value);
  const resp = await authFetch('/extract', { method: 'POST', body: form });
  if (!resp.ok) {
    let msg = 'Extraction failed (status ' + resp.status + ')';
    try {
      const body = await resp.text();
      const errData = JSON.parse(body);
      msg = errData.error || errData.detail || msg;
    } catch (_) {}
    if (msg.includes('API key') || msg.includes('api key')) throw new ApiKeyError(msg);
    throw new Error(msg);
  }
  return await resp.json();
}

extractBtn.addEventListener('click', async () => {
  if (!selectedFiles.length) return;
  const spec = buildSpec();
  if (!Object.keys(spec.fields).length) return;

  results.innerHTML = '';
  extractBtn.disabled = true;
  const warnings = [];
  const allRecords = [];
  const allResults = [];
  const total = selectedFiles.length;
  const instr = document.getElementById('instructions').value.trim();
  let completed = 0;

  const progressArea = document.getElementById('progressArea');
  const progressBar = document.getElementById('progressBar');
  const progressPct = document.getElementById('progressPct');
  const progressLog = document.getElementById('progressLog');
  progressArea.style.display = total > 1 ? 'block' : 'none';
  progressBar.style.width = '0%';
  progressPct.textContent = '0%';
  progressLog.innerHTML = '';

  // Init server-side results file
  let resultsFile = null;
  try {
    const initResp = await authFetch('/results/init', { method: 'POST' });
    const initData = await initResp.json();
    resultsFile = initData.file;
  } catch(e) {
    warnings.push('Could not init results file: ' + e.message);
  }

  // Process in batches of CONCURRENCY
  let apiKeyError = null;
  for (let i = 0; i < total && !apiKeyError; i += CONCURRENCY) {
    const batch = [];
    for (let j = i; j < Math.min(i + CONCURRENCY, total); j++) {
      batch.push(selectedFiles[j]);
    }
    st.textContent = 'Processing ' + completed + ' / ' + total + '...';

    const promises = batch.map(async file => {
      if (apiKeyError) return;
      const logEntry = document.createElement('div');
      logEntry.textContent = file.name + ' — extracting...';
      progressLog.appendChild(logEntry);
      progressLog.scrollTop = progressLog.scrollHeight;
      try {
        const data = await extractFile(file, spec, instr);
        logEntry.textContent = file.name + (data._error ? ' — error' : ' — done');
        if (data._info && data._info.length) {
          for (const msg of data._info) {
            const infoEl = document.createElement('div');
            infoEl.style.cssText = 'color:#dc2626; font-style:italic;';
            infoEl.textContent = file.name + ': ' + msg;
            progressLog.appendChild(infoEl);
            progressLog.scrollTop = progressLog.scrollHeight;
          }
        }
        if (data._warning) warnings.push(file.name + ': ' + data._warning);

        // Append to server-side file immediately
        if (resultsFile && !data._error) {
          authFetch('/results/append', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file: resultsFile, data }),
          }).catch(() => {});
        }

        if (data._error) {
          warnings.push(file.name + ': ' + data._error);
          return;
        }
        if (data.records && Array.isArray(data.records)) {
          for (const rec of data.records) {
            rec._source_file = file.name;
            allRecords.push(rec);
          }
        } else {
          allResults.push(data);
        }
      } catch(e) {
        if (e instanceof ApiKeyError) {
          apiKeyError = e.message;
          return;
        }
        warnings.push(file.name + ': ' + e.message);
      }
      completed++;
      const pct = Math.round((completed / total) * 100);
      progressBar.style.width = pct + '%';
      progressPct.textContent = pct + '%';
    });

    await Promise.all(promises);
    if (apiKeyError) break;
  }

  if (apiKeyError) {
    st.innerHTML = '<span style="color:#dc2626; font-weight:600;">' + apiKeyError + '</span>' +
      '<br><a href="/settings/page" style="color:#2563eb;">Go to Settings</a>';
    extractBtn.disabled = false;
    updateExtractBtn();
    return;
  }

  progressBar.style.width = '100%';
  progressPct.textContent = '100%';
  let statusText = 'Done — ' + total + ' file' + (total > 1 ? 's' : '') + ' processed.';
  if (warnings.length) {
    statusText += '\nWarnings:\n' + warnings.join('\n');
  }
  st.textContent = statusText;
  st.style.whiteSpace = 'pre-line';

  const AUTO_FILE_THRESHOLD = 200;

  if (allRecords.length) {
    if (allRecords.length > AUTO_FILE_THRESHOLD) {
      autoDownloadCsv(allRecords);
      results.innerHTML = '<p>Large result set (' + allRecords.length + ' records) — downloaded as CSV.</p>';
    } else {
      renderTable(allRecords);
    }
  } else if (allResults.length) {
    if (allResults.length > AUTO_FILE_THRESHOLD) {
      autoDownloadJson(allResults);
      results.innerHTML = '<p>Large result set (' + allResults.length + ' results) — downloaded as JSON.</p>';
    } else {
      const pre = document.createElement('pre');
      const jsonData = allResults.length === 1 ? allResults[0] : allResults;
      pre.textContent = JSON.stringify(jsonData, null, 2);
      results.appendChild(pre);
      const jsonBlob = new Blob([JSON.stringify(jsonData, null, 2)], { type: 'application/json' });
      const jsonUrl = URL.createObjectURL(jsonBlob);
      results.insertAdjacentHTML('beforeend',
        '<a class="download-btn" href="' + jsonUrl + '" download="extracted.json">Download JSON</a>');
    }
  }

  extractBtn.disabled = false;
  updateExtractBtn();
});

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function autoDownloadCsv(records) {
  const { flatRecords, allKeys } = flattenRecords(records);
  const csvRows = [allKeys.join(',')];
  for (const row of flatRecords) {
    csvRows.push(allKeys.map(k => {
      const s = row[k] != null ? String(row[k]) : '';
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(','));
  }
  triggerDownload(new Blob([csvRows.join('\n')], { type: 'text/csv' }), 'extracted.csv');
}

function autoDownloadJson(data) {
  const json = JSON.stringify(data, null, 2);
  triggerDownload(new Blob([json], { type: 'application/json' }), 'extracted.json');
}

function flattenRecords(records) {
  const flatRecords = [];
  const allKeys = [];
  const keySet = new Set();
  for (const rec of records) {
    const flat = {};
    let nestedItems = null;
    for (const [k, v] of Object.entries(rec)) {
      if (Array.isArray(v)) { nestedItems = v; }
      else { flat[k] = v; if (!keySet.has(k)) { keySet.add(k); allKeys.push(k); } }
    }
    if (nestedItems && nestedItems.length) {
      for (const item of nestedItems) {
        const row = { ...flat };
        for (const [k, v] of Object.entries(item)) {
          row[k] = v;
          if (!keySet.has(k)) { keySet.add(k); allKeys.push(k); }
        }
        flatRecords.push(row);
      }
    } else {
      flatRecords.push(flat);
    }
  }
  return { flatRecords, allKeys };
}

function renderTable(records) {
  if (!records.length) { results.textContent = 'No records found.'; return; }

  const { flatRecords, allKeys } = flattenRecords(records);

  let html = '<div class="table-wrap"><table class="results"><thead><tr>';
  for (const k of allKeys) html += '<th>' + k + '</th>';
  html += '</tr></thead><tbody>';
  for (const row of flatRecords) {
    html += '<tr>';
    for (const k of allKeys) {
      const v = row[k];
      html += '<td>' + (v != null ? String(v).replace(/</g,'&lt;') : '') + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  const csvRows = [allKeys.join(',')];
  for (const row of flatRecords) {
    csvRows.push(allKeys.map(k => {
      const s = row[k] != null ? String(row[k]) : '';
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(','));
  }
  const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  html += '<a class="download-btn" href="' + url + '" download="extracted.csv">Download CSV</a>';

  const jsonBlob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
  const jsonUrl = URL.createObjectURL(jsonBlob);
  html += '<a class="download-btn" href="' + jsonUrl + '" download="extracted.json">Download JSON</a>';

  results.innerHTML = html;
}

// Download schema as YAML
function specToYaml(spec) {
  function yamlStr(s) {
    if (s.includes('\n') || s.includes(':') || s.includes('#') || s.includes("'"))
      return '"' + s.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
    return s;
  }
  let y = '';
  if (spec.name) {
    const cleanName = spec.name.replace(/\.ya?ml$/i, '');
    y += 'name: ' + yamlStr(cleanName) + '\n';
  }
  if (spec.record_type) y += 'record_type: ' + spec.record_type + '\n';
  if (spec.instructions) y += 'instructions: ' + yamlStr(spec.instructions) + '\n';
  y += '\nfields:\n';
  for (const [name, cfg] of Object.entries(spec.fields)) {
    y += '  ' + yamlStr(name) + ':\n';
    y += '    type: ' + cfg.type + '\n';
    if (cfg.description) y += '    description: ' + yamlStr(cfg.description) + '\n';
    if (cfg.values && cfg.values.length) y += '    values: [' + cfg.values.join(', ') + ']\n';
    y += '\n';
  }
  return y.trimEnd() + '\n';
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const spec = buildSpec();
  if (!Object.keys(spec.fields).length) { alert('Add at least one field.'); return; }
  if (!spec.name) {
    const name = prompt('Schema name:');
    if (!name) return;
    spec.name = name;
    document.getElementById('schemaName').value = name;
  }
  const yaml = specToYaml(spec);
  const filename = spec.name.toLowerCase().replace(/\s+/g, '_') + '.yaml';
  const blob = new Blob([yaml], { type: 'text/yaml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  st.textContent = 'Downloaded ' + filename;
});
