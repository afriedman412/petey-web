name: mci_schema_test
record_type: array

fields:
  Address:
    type: string
    description: building address

  Docket Number:
    type: string
    description: housing court docket number

  Case Status:
    type: string
    description: closed or open

  Closing Date:
    type: date
    description: date case was closed

  Close Code:
    type: string
    description: two-letter code describing closure circumstances

  MCI Item:
    type: string
    description: major capital expense description

  Claim Cost:
    type: number
    description: MCI amount cost

  Allowed Cost:
    type: number
    description: MCI cost allowed

  MCI Increase Per Room:
    type: number
    description: cost per room
