services:
  petey:
    build:
      context: .
      dockerfile: Dockerfile.standalone
    ports:
      - "8080:8080"
    environment:
      - FIREBASE_AUTH_DISABLED=1
      - MAX_PAGES=0
      - PARSER_URL=http://parser:8081
    depends_on:
      - parser

  parser:
    build:
      context: ./parser
    expose:
      - "8081"
