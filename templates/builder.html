<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Petey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #111111;
  --surface:     #1c1c1c;
  --surface-2:   #262626;
  --border:      #333333;
  --accent:      #d8572a;
  --accent-h:    #e06b3e;
  --accent-dim:  rgba(216,87,42,0.12);
  --amber:       #f7b538;
  --amber-dim:   rgba(247,181,56,0.12);
  --green:       #86efac;
  --danger:      #c32f27;
  --text:        #f2ece4;
  --text-muted:  #db7c26;
  --text-dim:    #999999;
  --r:           8px;
  --r-lg:        12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* PAGE TOP LINK */
.page-top-link {
  font-size: 0.78rem; color: var(--text-muted); text-decoration: none;
  letter-spacing: 0.03em; transition: color 0.15s; align-self: flex-end;
  padding-bottom: 0.2rem;
}
.page-top-link:hover { color: var(--text); }
.page-top-link.active { color: var(--text); font-weight: 600; }

/* AUTH OVERLAY */
.auth-overlay {
  position: fixed; inset: 0; background: rgba(11,15,26,0.97);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 1.25rem;
}
.auth-overlay h2 {
  font-size: 2.8rem; font-weight: 800; letter-spacing: -0.05em; line-height: 1;
}
.auth-overlay p { color: var(--text-muted); font-size: 0.88rem; }
.auth-overlay .overlay-btn {
  padding: 11px 28px; font-size: 0.9rem; font-weight: 700; border-radius: 8px;
  border: none; background: var(--accent); color: #000; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.auth-overlay .overlay-btn:hover { background: var(--accent-h); }

/* MAIN */
.main { max-width: 940px; margin: 0 auto; padding: 2.75rem 2rem 5rem; }

/* HERO */
.hero { margin-bottom: 2.5rem; }
.hero-top {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 0.45rem;
}
.hero h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 3.2rem; font-weight: 400; letter-spacing: -0.01em; line-height: 0.95;
}
.hero h1 .dot { color: var(--accent); }
.hero-sub { font-size: 0.82rem; color: var(--text-muted); letter-spacing: 0.04em; }

/* DROPZONE */



/* CONTROLS ROW */
.controls-row {
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
  margin-bottom: 1.25rem;
}
.controls-label {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-muted);
}
.options-grid {
  display: flex; align-items: center; gap: 0.4rem;
}
.options-grid label {
  display: flex; align-items: center; gap: 0.4rem;
}

/* TOGGLE */
.toggle-group {
  display: flex; border: 1px solid var(--border); border-radius: 5px; overflow: hidden;
}
.toggle-group button {
  padding: 0.3rem 0.9rem; border: none; background: transparent; cursor: pointer;
  font-size: 0.8rem; color: var(--text-muted); font-family: inherit;
  transition: all 0.15s;
}
.toggle-group button.active { background: var(--accent); color: #000; font-weight: 600; }

/* EXTRA CONTROLS (header pages / page range) */
#headerPagesControl {
  align-items: center; gap: 0.6rem;
}
#headerPagesControl label {
  font-size: 0.76rem; color: var(--text-muted); margin: 0;
}
#headerPagesControl input {
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); padding: 0.22rem 0.4rem;
  font-size: 0.8rem; font-family: inherit; transition: border-color 0.15s;
}
#headerPagesControl input[type=number] { width: 4rem; }
#headerPagesControl input[type=text] { width: 9rem; }
#headerPagesControl input:focus { outline: none; border-color: var(--accent); }

/* CARD */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 1.5rem 1.75rem; margin-bottom: 1.25rem;
}
.card-header {
  display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem;
  padding-bottom: 0.85rem; border-bottom: 1px solid var(--border);
}
.card-label {
  font-size: 0.67rem; font-weight: 700; letter-spacing: 0.13em;
  text-transform: uppercase; color: var(--text-muted); flex-shrink: 0;
}
.schema-name-input {
  background: transparent; border: none; color: var(--text);
  font-size: 0.85rem; padding: 0; font-family: inherit; flex: 1; min-width: 0;
}
.schema-name-input:focus { outline: none; }
.schema-name-input::placeholder { color: var(--text-dim); }

/* FIELD ROWS */
.field-row {
  display: grid; grid-template-columns: 16px 18px 1fr 92px 2fr 22px;
  gap: 0.35rem; align-items: start; margin-bottom: 0.28rem;
}
.field-row .drag-handle {
  cursor: grab; color: var(--text-dim); font-size: 0.7rem; user-select: none;
  display: flex; align-items: center; justify-content: center;
}
.field-row .drag-handle:active { cursor: grabbing; }
.field-row.dragging { opacity: 0.4; }
.field-row.drag-over { border-top: 2px solid var(--accent); margin-top: -2px; }
.field-row input[type=text], .field-row select, .field-row textarea {
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text); padding: 0.27rem 0.4rem; font-size: 0.8rem;
  border-radius: 4px; width: 100%; font-family: inherit; transition: border-color 0.15s;
}
.field-row input[type=text]:focus, .field-row select:focus, .field-row textarea:focus {
  outline: none; border-color: var(--accent);
}
.field-row textarea {
  resize: none; overflow: hidden; min-height: 1.8em; line-height: 1.4;
}
.field-row select option { background: var(--surface-2); color: var(--text); }
.field-row input[type=checkbox] {
  width: 14px; height: 14px; margin: 0; cursor: pointer; accent-color: var(--accent);
}
.field-row.disabled input[type=text], .field-row.disabled select, .field-row.disabled textarea {
  opacity: 0.22; pointer-events: none;
}
.field-row .remove-btn {
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 1rem; padding: 0; line-height: 1; transition: color 0.15s;
}
.field-row .remove-btn:hover { color: var(--danger); }

.enum-values { grid-column: 1 / -1; margin-left: 1.2rem; margin-bottom: 0.28rem; }
.enum-values label {
  font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.16rem;
}
.enum-values input {
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text); padding: 0.22rem 0.4rem; font-size: 0.78rem;
  border-radius: 4px; width: 100%; font-family: inherit;
}
.enum-values input:focus { outline: none; border-color: var(--accent); }

/* BUTTONS */
.btn-row { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.7rem; }

.btn-add {
  padding: 0.32rem 0.8rem; font-size: 0.78rem; border: 1px solid var(--border);
  border-radius: 4px; background: var(--surface-2); color: var(--text-muted);
  cursor: pointer; font-family: inherit; transition: all 0.15s;
}
.btn-add:hover { border-color: var(--accent); color: var(--accent); }

.btn-ghost {
  background: none; border: none; color: var(--text-muted); font-size: 0.78rem;
  cursor: pointer; padding: 0; font-family: inherit;
  text-decoration: underline; text-underline-offset: 3px; transition: color 0.15s;
}
.btn-ghost:hover { color: var(--text); }

/* INSTRUCTIONS */
.instructions-area {
  width: 100%; min-height: 52px; font-size: 0.8rem;
  padding: 0.48rem 0.6rem; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 4px;
  font-family: inherit; resize: vertical; color: var(--text);
  transition: border-color 0.15s;
}
.instructions-area:focus { outline: none; border-color: var(--accent); }
.instructions-area::placeholder { color: var(--text-dim); }

/* ACTION ROW */
.action-row { display: flex; gap: 0.75rem; align-items: center; margin-top: 0.5rem; }

.extract-btn {
  padding: 0.65rem 1.75rem; font-size: 0.88rem; font-weight: 700;
  background: var(--accent); color: #000; border: none;
  border-radius: 6px; cursor: pointer; font-family: inherit;
  letter-spacing: 0.03em; transition: background 0.15s;
}
.extract-btn:hover:not(:disabled) { background: var(--accent-h); }
.extract-btn:disabled {
  background: var(--surface-2); color: var(--text-dim);
  border: 1px solid var(--border); cursor: not-allowed;
}

.save-btn {
  padding: 0.6rem 1.1rem; font-size: 0.8rem; font-weight: 500;
  background: var(--amber-dim); border: 1px solid rgba(251,191,36,0.22);
  color: var(--amber); border-radius: 6px; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.save-btn:hover { background: rgba(251,191,36,0.14); }

.schema-btn {
  padding: 0.38rem 0.9rem; font-size: 0.78rem; font-weight: 500;
  background: var(--surface-2); border: 1px solid var(--border);
  color: var(--text-muted); border-radius: 5px; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.schema-btn:hover { border-color: var(--accent); color: var(--accent); }
@keyframes pulse-fade { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.schema-btn.analyzing { color: var(--accent); border-color: var(--accent); animation: pulse-fade 1.5s ease-in-out infinite; }

/* STATUS + PROGRESS */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
#status {
  margin: 0.75rem 0; font-size: 0.82rem; color: var(--text-muted);
  white-space: pre-line; line-height: 1.6;
}
#status.extracting { animation: pulse 1.5s ease-in-out infinite; }
.progress-track {
  height: 2px; background: var(--surface-2); border-radius: 1px;
  overflow: hidden; margin-bottom: 0.5rem;
}
#progressLog {
  font-size: 0.72rem; color: var(--text-muted); max-height: 110px;
  overflow-y: auto; line-height: 1.65; margin-top: 0.5rem;
}

/* RESULTS */
pre {
  background: var(--surface); border: 1px solid var(--border);
  padding: 1rem; border-radius: var(--r); overflow-x: auto;
  font-size: 0.77rem; color: var(--text); line-height: 1.65; margin-top: 0.5rem;
}
.table-wrap {
  max-height: 480px; overflow: auto; border-radius: var(--r);
  border: 1px solid var(--border); margin-top: 0.75rem;
}
table.results { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
table.results th {
  background: var(--surface-2); color: var(--text-muted);
  font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em;
  padding: 0.38rem 0.6rem; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; text-align: left;
}
table.results td {
  padding: 0.3rem 0.6rem; border-bottom: 1px solid var(--border);
  color: var(--text); vertical-align: top;
}
table.results tr:last-child td { border-bottom: none; }
table.results tr:hover td { background: var(--surface-2); }

.download-btn {
  display: inline-block; margin-top: 0.5rem; margin-right: 0.4rem;
  padding: 0.26rem 0.72rem; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 4px;
  cursor: pointer; font-size: 0.74rem; text-decoration: none;
  color: var(--text-muted); font-family: inherit; transition: all 0.15s;
}
.download-btn:hover { border-color: var(--accent); color: var(--accent); }

/* TOOLTIPS */
[data-tip] {
  position: relative;
}
[data-tip]::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%;
  transform: translateX(-50%); white-space: nowrap;
  background: var(--surface-2); color: var(--text);
  font-size: 0.7rem; padding: 0.3rem 0.6rem; border-radius: 4px;
  border: 1px solid var(--border); pointer-events: none;
  opacity: 0; transition: opacity 0.15s;
  z-index: 10;
}
[data-tip]:hover::after { opacity: 1; }

/* MOBILE */
@media (max-width: 640px) {
  .main { padding: 1.5rem 1rem 3rem; }
  .hero h1 { font-size: 2rem; }
  .auth-overlay h2 { font-size: 2rem; }
  .card { padding: 1rem 1rem; }
  .field-row {
    grid-template-columns: 1fr;
    gap: 0.25rem;
  }
  .field-row .drag-handle,
  .field-row input[type=checkbox] { display: none; }
  .field-row .remove-btn { justify-self: end; }
  .controls-row {
    flex-direction: column; align-items: flex-start; gap: 0.4rem;
  }
  .controls-row .controls-label { margin-bottom: 0.1rem; }
  .controls-row label { margin-left: 0 !important; }
  .controls-row .options-grid {
    display: grid; grid-template-columns: auto 1fr; gap: 0.4rem 0.6rem;
    align-items: center; width: 100%;
  }
  .controls-row .options-grid label {
    display: contents;
  }
  .controls-row .options-grid select { width: 100%; }
  #headerPagesControl { flex-wrap: wrap; gap: 0.4rem 0.6rem; }
  #headerPagesControl input[type=number] { width: 3.5rem; }
  #headerPagesControl input[type=text] { width: 7rem; }
  .toggle-group button { padding: 0.4rem 0.7rem; min-height: 44px; }
  .action-row { flex-wrap: wrap; }
  .extract-btn, .save-btn { min-height: 44px; }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .btn-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 0.4rem; justify-items: center;
  }
  .btn-add, .btn-ghost, .schema-btn {
    min-height: 44px; display: inline-flex; align-items: center;
    justify-content: center; font-size: 0.72rem; padding: 0.3rem 0.6rem; width: 100%;
  }
}
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay" style="display:none">
  <h2 style="font-family:'DM Serif Display',Georgia,serif; font-weight:400;">Petey<span style="color:var(--accent)">.</span></h2>
  <p>Sign in to get started</p>
  <button id="overlaySignIn" class="overlay-btn">Sign in with Google</button>
  <p style="color:var(--text-dim); font-size:0.75rem; max-width:280px; text-align:center; line-height:1.5;">Sign-in is only used to protect your API keys. We don't store any other personal data.</p>
</div>

<main class="main">

  <script src="/static/navbar.js"></script>
  <nav-bar active="extractor" subtitle="Easy PDF Extraction"></nav-bar>

  <script src="/static/dropzone.js"></script>
  <drop-zone id="dropzone" max-files="5000"></drop-zone>

  <div class="controls-row">
    <span class="controls-label">Mode</span>
    <div class="toggle-group" id="modeToggle">
      <button class="active" data-mode="query" data-tip="Extract one record per document">Query</button>
      <button data-mode="table" data-tip="Extract rows from tables across pages">Table</button>
      <button data-mode="text" data-tip="Extract text only — no schema needed">Text</button>
    </div>
  </div>

  <div class="controls-row">
    <span class="controls-label">Pages</span>
    <span id="headerPagesControl" style="display:inline-flex; align-items:center; gap:0.6rem;">
      <label style="margin:0;">Page range</label>
      <input type="text" id="pageRange" placeholder="e.g. 2-5 or 1,3,5-7">
      <label style="margin:0 0 0 0.5rem;">Header pages</label>
      <input type="number" id="headerPages" value="0" min="0" max="10">
    </span>
  </div>

  <div class="controls-row">
    <span class="controls-label">Options</span>
    <div class="options-grid">
      <label style="font-size:0.8rem; color:var(--text-muted); cursor:pointer;">
        Parser
        <select id="parserSelect" style="background:var(--surface-2); border:1px solid var(--border); border-radius:4px; color:var(--text); padding:0.2rem 0.4rem; font-size:0.78rem; font-family:inherit;">
          <option value="pymupdf">PyMuPDF</option>
          <option value="pdfplumber">pdfplumber</option>
          <option value="datalab">Datalab (Marker)</option>
          <option value="unstructured">Unstructured</option>
        </select>
      </label>
      <label style="font-size:0.8rem; color:var(--text-muted);">
        Model
        <select id="modelSelect" style="background:var(--surface-2); border:1px solid var(--border); border-radius:4px; color:var(--text); padding:0.2rem 0.4rem; font-size:0.78rem; font-family:inherit;">
        </select>
      </label>
    </div>
  </div>

  <div class="card" id="schemaCard">
    <div class="card-header">
      <span class="card-label">Schema</span>
      <input type="text" class="schema-name-input" id="schemaName" placeholder="Untitled schema">
    </div>
    <div id="fieldRows"></div>
    <div style="padding:0.5rem 0.75rem;">
      <label style="font-size:0.72rem; color:var(--text-dim); display:block; margin-bottom:0.25rem;">Additional instructions <span style="font-size:0.65rem;">(optional)</span></label>
      <textarea class="instructions-area" id="instructions"
        placeholder="e.g. Extract all line items with date, description, and amount"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn-add" id="addField">+ Add field</button>
      <button class="schema-btn" id="suggestFields">Suggest fields</button>
      <input type="file" id="suggestFile" accept=".pdf" style="display:none;">
      <button class="schema-btn" id="yamlToggle">Import</button>
      <input type="file" id="yamlFile" accept=".yaml,.yml" style="display:none;">
      <button class="schema-btn" id="previewSchema">Preview</button>
      <button class="schema-btn" id="saveBtn">Download</button>
      <button class="schema-btn" id="resetSchema" style="color:var(--text-dim);">Reset</button>
    </div>
  </div>

  <div class="action-row">
    <button class="extract-btn" id="extractBtn" disabled>Extract</button>
  </div>

  <div id="streamProgress" style="display:none; margin-top:1.25rem;">
    <div style="display:flex; justify-content:space-between; font-size:0.72rem; color:var(--text-muted); margin-bottom:0.25rem;">
      <span>Parsing</span><span id="parsePct">0 / ?</span>
    </div>
    <div class="progress-track"><div id="parseBar" style="height:100%; background:var(--amber); border-radius:1px; width:0%; transition:width 0.3s;"></div></div>
    <div style="display:flex; justify-content:space-between; font-size:0.72rem; color:var(--text-muted); margin-bottom:0.25rem; margin-top:0.5rem;">
      <span>Extracting</span><span id="extractPct">0 / ?</span>
    </div>
    <div class="progress-track"><div id="extractBar" style="height:100%; background:var(--accent); border-radius:1px; width:0%; transition:width 0.3s;"></div></div>
    <div id="progressLog"></div>
    <button id="cancelRunBtn" style="margin-top:0.75rem; padding:0.4rem 1rem; font-size:0.78rem; font-weight:600; background:transparent; color:var(--danger); border:1px solid var(--danger); border-radius:5px; cursor:pointer; font-family:inherit; transition:all 0.15s;" onmouseover="this.style.background='var(--danger)';this.style.color='#000'" onmouseout="this.style.background='transparent';this.style.color='var(--danger)'">Cancel run</button>
  </div>

  <div id="status"></div>
  <div id="results"></div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getAuth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

// --- Firebase Auth setup ---
const cfgResp = await fetch('/firebase-config');
const firebaseConfig = await cfgResp.json();

let _currentUser = null;

if (firebaseConfig.authDisabled) {
  document.getElementById('authOverlay').style.display = 'none';
  checkApiKeys();
} else {
  const firebaseApp = initializeApp(firebaseConfig);
  const auth = getAuth(firebaseApp);
  const provider = new GoogleAuthProvider();

  document.getElementById('overlaySignIn').addEventListener('click', () => signInWithPopup(auth, provider));
  document.getElementById('signOutLink').addEventListener('click', e => { e.preventDefault(); signOut(auth); });

  onAuthStateChanged(auth, user => {
    const overlay = document.getElementById('authOverlay');
    _currentUser = user;
    overlay.style.display = user ? 'none' : 'flex';
    document.getElementById('signOutLink').style.display = user ? '' : 'none';
    if (user) checkApiKeys();
  });
}

async function authFetch(url, opts = {}) {
  if (_currentUser) {
    const token = await _currentUser.getIdToken();
    opts.headers = { ...(opts.headers || {}), 'Authorization': 'Bearer ' + token };
  }
  return fetch(url, opts);
}

// --- Key check ---
let hasApiKey = false;
let _hasOpenaiKey = false;
let _hasAnthropicKey = false;
let _models = [];

function getSelectedProvider() {
  const modelId = document.getElementById('modelSelect').value || '';
  const m = _models.find(x => x.id === modelId);
  return m ? m.provider : (modelId.includes('claude') ? 'anthropic' : 'openai');
}

function checkModelKeyMatch() {
  const provider = getSelectedProvider();
  if (provider === 'none') {
    hasApiKey = true;
    updateKeyGate();
    return;
  }
  const hasKey = provider === 'anthropic' ? _hasAnthropicKey : _hasOpenaiKey;
  const dz = document.getElementById('dropzone');
  if (!hasKey && hasApiKey) {
    dz.setGateMessage('<span style="font-size:1.1rem; font-weight:600; color:#fff;">The selected model requires ' +
      (provider === 'anthropic' ? 'an Anthropic' : 'an OpenAI') +
      ' API key. Add one in <a href="/settings/page" style="color:var(--accent); text-decoration:underline;">Settings</a> or choose a different model.</span>');
  } else {
    updateKeyGate();
  }
}

async function checkApiKeys() {
  try {
    const resp = await authFetch('/settings');
    if (!resp.ok) return;
    const data = await resp.json();
    const hasKey = k => k && k.length > 0;
    _hasOpenaiKey = hasKey(data.openai_api_key);
    _hasAnthropicKey = hasKey(data.anthropic_api_key);
    hasApiKey = _hasOpenaiKey || _hasAnthropicKey;
    _models = data.models || [];

    const sel = document.getElementById('modelSelect');
    sel.innerHTML = '';
    for (const m of _models) {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name;
      sel.appendChild(opt);
    }
    sel.value = data.model;
    sel.addEventListener('change', checkModelKeyMatch);
  } catch(_) {}
  checkModelKeyMatch();
}

function updateKeyGate() {
  const dz = document.getElementById('dropzone');
  const provider = getSelectedProvider();
  if (!hasApiKey && provider !== 'none') {
    dz.setGateMessage('<span style="font-size:1.3rem; font-weight:600; color:#fff;">Set your OpenAI or Anthropic API key in <a href="/settings/page" style="color:var(--accent); text-decoration:underline;">Settings</a> to get started</span>');
  } else {
    dz.clearGate();
  }
}

// --- IndexedDB for run result caching ---
function openRunsDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('petey_runs', 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('results')) {
        db.createObjectStore('results', { keyPath: 'run_id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveRunResults(runId, records) {
  const db = await openRunsDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('results', 'readwrite');
    tx.objectStore('results').put({ run_id: runId, records, updated_at: Date.now() });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function appendRunResult(runId, record) {
  const db = await openRunsDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('results', 'readwrite');
    const store = tx.objectStore('results');
    const req = store.get(runId);
    req.onsuccess = () => {
      const existing = req.result || { run_id: runId, records: [] };
      existing.records.push(record);
      existing.updated_at = Date.now();
      store.put(existing);
    };
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// --- Run tracking helpers ---
let _activeRunId = null;

async function startRun(filename, spec, instructions, totalPages) {
  try {
    const settingsResp = await authFetch('/settings');
    const settings = await settingsResp.json();
    const resp = await authFetch('/runs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        filename,
        schema_spec: spec,
        instructions: instructions || '',
        model: document.getElementById('modelSelect')?.value || settings.model || '',
        parser: spec.parser || document.getElementById('parserSelect')?.value || 'pymupdf',
        mode: spec.mode || 'query',
        concurrency: settings.concurrency || 10,
        total_pages: totalPages || 0,
      }),
    });
    const run = await resp.json();
    _activeRunId = run.id;
    return run.id;
  } catch (e) {
    console.warn('Failed to create run:', e);
    return null;
  }
}

async function updateRunProgress(runId, updates) {
  if (!runId) return;
  try {
    await authFetch('/runs/' + runId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates),
    });
  } catch (_) {}
}

async function finishRun(runId, status, pagesParsed, pagesExtracted) {
  if (!runId) return;
  _activeRunId = null;
  try {
    await authFetch('/runs/' + runId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        status,
        finished_at: new Date().toISOString(),
        pages_parsed: pagesParsed || 0,
        pages_extracted: pagesExtracted || 0,
      }),
    });
  } catch (_) {}
}

const STATE_KEY = 'petey_builder_state';

function saveState() {
  const state = {
    schemaName: document.getElementById('schemaName').value,
    fields: fields,
    recordType: recordType,
    instructions: document.getElementById('instructions').value,
    parser: document.getElementById('parserSelect').value,
  };
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch (_) {}
}

function restoreState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return false;
    const state = JSON.parse(raw);
    if (state.schemaName) document.getElementById('schemaName').value = state.schemaName;
    if (state.fields && state.fields.length > 0) fields = state.fields;
    if (state.recordType) { recordType = state.recordType; updateModeToggle(); }
    if (state.instructions) document.getElementById('instructions').value = state.instructions;
    if (state.parser) document.getElementById('parserSelect').value = state.parser;
    return true;
  } catch (_) { return false; }
}

  fields = [{ name: '', type: 'string', description: '', values: '', enabled: true }];

let _dragIdx = null;

function renderFields() {
  fieldRows.innerHTML = '';
  fields.forEach((f, i) => {
    if (f.enabled === undefined) f.enabled = true;
    const row = document.createElement('div');
    row.className = 'field-row' + (f.enabled ? '' : ' disabled');
    row.draggable = true;
    row.dataset.idx = i;
    row.innerHTML =
      '<span class="drag-handle" title="Drag to reorder">⠿</span>' +
      '<input type="checkbox"' + (f.enabled ? ' checked' : '') + ' data-i="' + i + '" data-key="enabled" title="Include this field">' +
      '<input type="text" placeholder="Field name" value="' + esc(f.name) + '" data-i="' + i + '" data-key="name">' +
      '<select data-i="' + i + '" data-key="type">' +
        '<option value="string"' + (f.type==='string'?' selected':'') + '>Text</option>' +
        '<option value="number"' + (f.type==='number'?' selected':'') + '>Number</option>' +
        '<option value="date"' + (f.type==='date'?' selected':'') + '>Date</option>' +
        '<option value="enum"' + (f.type==='enum'?' selected':'') + '>Category</option>' +
      '</select>' +
      '<textarea placeholder="Description" rows="1" data-i="' + i + '" data-key="description">' + esc(f.description) + '</textarea>' +
      '<button class="remove-btn" data-i="' + i + '">&times;</button>';

    row.addEventListener('dragstart', e => {
      _dragIdx = i;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      fieldRows.querySelectorAll('.field-row').forEach(r => r.classList.remove('drag-over'));
      _dragIdx = null;
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      const from = _dragIdx;
      const to = parseInt(row.dataset.idx);
      if (from !== null && from !== to) {
        const [moved] = fields.splice(from, 1);
        fields.splice(to, 0, moved);
        renderFields();
      }
    });

    fieldRows.appendChild(row);

    if (f.type === 'enum') {
      const ev = document.createElement('div');
      ev.className = 'enum-values';
      ev.innerHTML = '<label>Values (comma-separated, leave blank to infer):</label>' +
        '<input type="text" placeholder="Option A, Option B, ... (or leave blank)" value="' + esc(f.values) + '" data-i="' + i + '" data-key="values">';
      fieldRows.appendChild(ev);
    }
  });

  fieldRows.querySelectorAll('input, select, textarea').forEach(el => {
    const handler = e => {
      const idx = parseInt(e.target.dataset.i);
      if (e.target.dataset.key === 'enabled') {
        fields[idx].enabled = e.target.checked;
        renderFields();
      } else {
        fields[idx][e.target.dataset.key] = e.target.value;
        if (e.target.dataset.key === 'type') renderFields();
      }
      updateExtractBtn();
      saveState();
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });

  // Auto-resize description textareas
  fieldRows.querySelectorAll('textarea').forEach(ta => {
    function autoResize() { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
    ta.addEventListener('input', autoResize);
    autoResize();
  });
  fieldRows.querySelectorAll('.remove-btn').forEach(el => {
    el.addEventListener('click', e => {
      fields.splice(parseInt(e.currentTarget.dataset.i), 1);
      renderFields();
      updateExtractBtn();
    });
  });
  updateExtractBtn();
}

async function _runSuggest(file) {
  const endpoint = '/infer-schema/vision';
  const btn = document.getElementById('suggestFields');
  const origText = btn.textContent;
  btn.textContent = 'Analyzing...';
  btn.classList.add('analyzing');
  btn.disabled = true;
  try {
    const form = new FormData();
    form.append('file', file);

    if (model && model !== 'none') form.append('model', model);
    const pr = document.getElementById('pageRange').value.trim();
    if (pr) form.append('page_range', pr);
    const hp = parseInt(document.getElementById('headerPages').value) || 0;
    if (hp > 0) form.append('header_pages', hp);
    const resp = await authFetch(endpoint, { method: 'POST', body: form });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || 'Schema inference failed');
    }
    const spec = await resp.json();
    if (spec.name) document.getElementById('schemaName').value = spec.name;
    if (spec.mode === 'table') {
      recordType = 'table';
      updateModeToggle();
    }
    fields = Object.entries(spec.fields || {}).map(([name, cfg]) => ({
      name, type: cfg.type || 'string', description: cfg.description || '',
      values: (cfg.values || []).join(', '), enabled: true,
    }));
    renderFields();
  } catch (err) {
    alert(err.message);
  } finally {
    btn.textContent = origText;
    btn.classList.remove('analyzing');
    btn.disabled = false;
  }
}

// Build schema spec from fields (only enabled ones)
function buildSpec() {
  const spec = {};
  const name = document.getElementById('schemaName').value.trim();
  if (name) spec.name = name;
  if (recordType === 'table') {
    spec.mode = 'table';
  }
  const hp = parseInt(document.getElementById('headerPages').value) || 0;
  if (hp > 0) spec.header_pages = hp;
  const pr = document.getElementById('pageRange').value.trim();
  if (pr) spec.pages = pr;
  const instr = document.getElementById('instructions').value.trim();
  if (instr) spec.instructions = instr;
  const parser = document.getElementById('parserSelect').value;
  if (parser && parser !== 'pymupdf') spec.parser = parser;
  const model = document.getElementById('modelSelect').value;
  if (model) spec.model = model;
  spec.fields = {};
  for (const f of fields) {
    if (!f.name.trim() || !f.enabled) continue;
    const cfg = { type: f.type, description: f.description };
    if (f.type === 'enum') {
      const vals = f.values.split(',').map(v => v.trim()).filter(Boolean);
      if (vals.length) cfg.values = vals;
    }
    spec.fields[f.name.trim()] = cfg;
  }
  return spec;
}

// Extract — concurrency default
const DEFAULT_CONCURRENCY = 10;

async function getConcurrency() {
  try {
    const resp = await authFetch('/settings');
    if (resp.ok) {
      const data = await resp.json();
      return data.concurrency || DEFAULT_CONCURRENCY;
    }
  } catch (_) {}
  return DEFAULT_CONCURRENCY;
}

class ApiKeyError extends Error {
  constructor(msg) { super(msg); this.name = 'ApiKeyError'; }
}

async function extractFile(file, spec, instr) {
  const form = new FormData();
  form.append('file', file);
  form.append('mode', recordType);
  if (recordType !== 'text') form.append('schema_spec', JSON.stringify(spec));
  if (instr) form.append('instructions', instr);
  form.append('parser', document.getElementById('parserSelect').value);
  form.append('model', document.getElementById('modelSelect').value);
  const resp = await authFetch('/extract', { method: 'POST', body: form });
  if (!resp.ok) {
    let msg = 'Extraction failed (status ' + resp.status + ')';
    try {
      const body = await resp.text();
      const errData = JSON.parse(body);
      msg = errData.error || errData.detail || msg;
    } catch (_) {}
    if (msg.includes('API key') || msg.includes('api key')) throw new ApiKeyError(msg);
    throw new Error(msg);
  }
  return await resp.json();
}

let _streamAbort = null;

async function extractFileStream(file, spec, instr, onEvent) {
  _streamAbort = new AbortController();
  const form = new FormData();
  form.append('file', file);
  form.append('schema_spec', JSON.stringify(spec));
  if (instr) form.append('instructions', instr);
  form.append('parser', document.getElementById('parserSelect').value);
  form.append('model', document.getElementById('modelSelect').value);
  const resp = await authFetch('/extract/stream', { method: 'POST', body: form, signal: _streamAbort.signal });
  if (!resp.ok) {
    let msg = 'Extraction failed (status ' + resp.status + ')';
    try {
      const body = await resp.text();
      const errData = JSON.parse(body);
      msg = errData.error || errData.detail || msg;
    } catch (_) {}
    if (msg.includes('API key') || msg.includes('api key')) throw new ApiKeyError(msg);
    throw new Error(msg);
  }
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.trim()) continue;
      const msg = JSON.parse(line);
      if (onEvent) onEvent(msg);
      if (msg.type === 'result') { _streamAbort = null; return msg.data; }
    }
  }
  _streamAbort = null;
  throw new Error('Stream ended without result');
}

document.getElementById('cancelRunBtn').addEventListener('click', () => {
  if (!confirm('Cancel the current extraction? Progress will be lost.')) return;
  if (_streamAbort) { _streamAbort.abort(); _streamAbort = null; }
  if (_activeRunId) { finishRun(_activeRunId, 'cancelled', 0, 0); }
  st.textContent = 'Cancelled.';
  st.classList.remove('extracting');
  document.getElementById('streamProgress').style.display = 'none';
  extractBtn.disabled = false;
  updateExtractBtn();
});

extractBtn.addEventListener('click', async () => {
  if (!selectedFiles.length) return;

  const isTextMode = recordType === 'text';
  const spec = isTextMode ? {} : buildSpec();
  if (!isTextMode && !Object.keys(spec.fields).length) return;

  results.innerHTML = '';
  extractBtn.disabled = true;
  st.classList.add('extracting');
  const warnings = [];
  const allRecords = [];
  const allResults = [];
  const total = selectedFiles.length;
  const instr = document.getElementById('instructions').value.trim();
  let completed = 0;

  const progressLog = document.getElementById('progressLog');
  progressLog.innerHTML = '';
  // Reset stream progress bars
  document.getElementById('streamProgress').style.display = 'none';
  document.getElementById('parseBar').style.width = '0%';
  document.getElementById('parsePct').textContent = '0 / ?';
  document.getElementById('extractBar').style.width = '0%';
  document.getElementById('extractPct').textContent = '0 / ?';

  // Init server-side results file
  let resultsFile = null;
  try {
    const initResp = await authFetch('/results/init', { method: 'POST' });
    const initData = await initResp.json();
    resultsFile = initData.file;
  } catch(e) {
    warnings.push('Could not init results file: ' + e.message);
  }

  // Start run tracking
  const filename = total === 1 ? selectedFiles[0].name : total + ' files';
  const runId = await startRun(filename, spec, instr, _cachedPageCount || total);

  // Show stream progress for all runs (two bars)
  const sp = document.getElementById('streamProgress');
  const useStream = recordType === 'table' && total === 1;
  sp.style.display = '';
  st.textContent = 'Extracting...';
  const _extractStart = Date.now();

  // Track file-level progress for multi-file, page-level for single stream
  let sent = 0, done = 0;
  let spicyParsed = 0, spicyExtracted = 0;
  // Estimate chunk count from page range if available
  let totalLabel = 'counting...';
  const _pr = document.getElementById('pageRange').value.trim();
  if (_pr) {
    let _cnt = 0;
    for (const part of _pr.split(',')) {
      const p = part.trim();
      if (p.includes('-')) {
        const [a, b] = p.split('-').map(Number);
        _cnt += Math.max(0, b - a + 1);
      } else { _cnt++; }
    }
    const _hp = parseInt(document.getElementById('headerPages').value) || 0;
    _cnt = Math.max(0, _cnt - _hp);
    if (_cnt > 0) totalLabel = String(_cnt);
  }

  function updateTotalLabel() {}

  function updateBars() {
    updateTotalLabel();
    if (useStream) {
      document.getElementById('parsePct').textContent = spicyParsed + ' / ' + totalLabel;
      document.getElementById('parseBar').style.width = _cachedPageCount ? (spicyParsed / _cachedPageCount * 100) + '%' : '0%';
      document.getElementById('extractPct').textContent = spicyExtracted + ' / ' + totalLabel;
      document.getElementById('extractBar').style.width = _cachedPageCount ? (spicyExtracted / _cachedPageCount * 100) + '%' : '0%';
    } else {
      document.getElementById('parsePct').textContent = sent + ' / ' + total + ' files sent';
      document.getElementById('parseBar').style.width = (sent / total * 100) + '%';
      document.getElementById('extractPct').textContent = done + ' / ' + total + ' files done (' + totalLabel + ' pages)';
      document.getElementById('extractBar').style.width = (done / total * 100) + '%';
    }
  }
  updateBars();

  // Process in batches based on parser type
  const concurrency = await getConcurrency();
  let apiKeyError = null;
  let _pagesProcessed = 0;
  let _pageLimitHit = false;
  for (let i = 0; i < total && !apiKeyError && !_pageLimitHit; i += concurrency) {
    const batch = [];
    for (let j = i; j < Math.min(i + concurrency, total); j++) {
      batch.push(selectedFiles[j]);
    }

    const promises = batch.map(async file => {
      if (apiKeyError || _pageLimitHit) return;
      sent++;
      updateBars();
      const logEntry = document.createElement('div');
      logEntry.textContent = fileLabel(file.name) + ' — extracting...';
      progressLog.appendChild(logEntry);
      progressLog.scrollTop = progressLog.scrollHeight;
      st.textContent = fileLabel(file.name) + ' — extracting...';
      try {
        let data;
        if (useStream) {
          let stotal = '?';
          data = await extractFileStream(file, spec, instr, evt => {
            if (evt.type === 'parse') {
              spicyParsed++;
              stotal = evt.total;
              if (spicyParsed === 1) {
                _cachedPageCount = stotal;
                totalLabel = String(stotal);
                updateRunProgress(runId, { total_pages: stotal });
              }
              updateBars();
              st.textContent = fileLabel(file.name) + ' — parsing ' + evt.page;
            } else if (evt.type === 'extract') {
              spicyExtracted++;
              updateBars();
              st.textContent = fileLabel(file.name) + ' — extracting ' + evt.page;
              if (spicyExtracted % 10 === 0) updateRunProgress(runId, { pages_parsed: spicyParsed, pages_extracted: spicyExtracted });
            }
          });
        } else if (isTextMode) {
          data = await extractFile(file, {}, '');
        } else {
          data = await extractFile(file, spec, instr);
        }
        logEntry.textContent = fileLabel(file.name) + (data._error ? ' — error' : ' — done');
        if (data._info && data._info.length) {
          for (const msg of data._info) {
            const infoEl = document.createElement('div');
            infoEl.style.cssText = 'color:#f87171; font-style:italic;';
            infoEl.textContent = file.name + ': ' + msg;
            progressLog.appendChild(infoEl);
            progressLog.scrollTop = progressLog.scrollHeight;
          }
        }
        if (data._warning) warnings.push(file.name + ': ' + data._warning);

        if (resultsFile && !data._error) {
          authFetch('/results/append', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file: resultsFile, data }),
          }).catch(() => {});
        }

        if (data._error) {
          warnings.push(file.name + ': ' + data._error);
          return;
        }
        if (data.records && Array.isArray(data.records)) {
          for (const rec of data.records) {
            rec._source_file = file.name;
            allRecords.push(rec);
          }
        } else {
          allResults.push(data);
        }
      } catch(e) {
        if (e instanceof ApiKeyError) {
          apiKeyError = e.message;
          return;
        }
        warnings.push(file.name + ': ' + e.message);
      }
      completed++;
      done++;
      _pagesProcessed += (_perFilePages[file.name] || 1);
      if (_maxPages > 0 && _pagesProcessed >= _maxPages) {
        _pageLimitHit = true;
      }
      updateBars();
    });

    await Promise.all(promises);
    if (apiKeyError) break;
    if (_pageLimitHit) break;
  }

  sp.style.display = 'none';

  if (_pageLimitHit) {
    warnings.push('Page limit reached (' + _maxPages + ' pages). Remaining files were skipped.');
  }

  if (apiKeyError) {
    st.innerHTML = '<span style="color:#f87171; font-weight:600;">' + apiKeyError + '</span>' +
      '<br><a href="/settings/page" style="color:var(--accent);">Go to Settings</a>';
    finishRun(runId, 'error', spicyParsed || sent, spicyExtracted || done);
    st.classList.remove('extracting');
    extractBtn.disabled = false;
    updateExtractBtn();
    return;
  }

  // Save results to IndexedDB and finish run
  const allData = allRecords.length ? allRecords : allResults;
  saveRunResults(runId, allData);
  const finalParsed = spicyParsed || completed;
  const finalExtracted = spicyExtracted || completed;
  finishRun(runId, 'completed', finalParsed, finalExtracted);
  const _elapsed = ((Date.now() - _extractStart) / 1000).toFixed(1);
  let statusText = 'Done — ' + total + ' file' + (total > 1 ? 's' : '') + ' processed (' + _elapsed + 's).';
  if (warnings.length) {
    statusText += '\nWarnings:\n' + warnings.join('\n');
  }
  st.textContent = statusText;
  st.style.whiteSpace = 'pre-line';

  const AUTO_FILE_THRESHOLD = 200;

  // Check if text-only mode (results have 'text' field)
  const isTextOnly = allResults.length > 0 && allResults[0].text !== undefined;

  if (isTextOnly) {
    renderTextResults(allResults);
  } else if (allRecords.length) {
    if (allRecords.length > AUTO_FILE_THRESHOLD) {
      renderTablePreview(allRecords);
    } else {
      renderTable(allRecords);
    }
  } else if (allResults.length) {
    if (allResults.length > AUTO_FILE_THRESHOLD) {
      renderTablePreview(allResults);
    } else if (allResults.length === 1) {
      renderSingleResult(allResults[0]);
    } else {
      renderTable(allResults);
    }
  }

  st.classList.remove('extracting');
  extractBtn.disabled = false;
  updateExtractBtn();
});

function extractedFilename(ext) {
  const d = new Date();
  const ts = d.getFullYear().toString()
    + String(d.getMonth() + 1).padStart(2, '0')
    + String(d.getDate()).padStart(2, '0')
    + '_' + String(d.getHours()).padStart(2, '0')
    + String(d.getMinutes()).padStart(2, '0')
    + String(d.getSeconds()).padStart(2, '0');
  return 'extracted_' + ts + '.' + ext;
}

function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function autoDownloadCsv(records) {
  const { flatRecords, allKeys } = flattenRecords(records);
  const csvRows = [allKeys.join(',')];
  for (const row of flatRecords) {
    csvRows.push(allKeys.map(k => {
      const s = row[k] != null ? String(row[k]) : '';
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(','));
  }
  triggerDownload(new Blob([csvRows.join('\n')], { type: 'text/csv' }), extractedFilename('csv'));
}

function autoDownloadJson(data) {
  const json = JSON.stringify(data, null, 2);
  triggerDownload(new Blob([json], { type: 'application/json' }), extractedFilename('json'));
}

function flattenRecords(records) {
  const flatRecords = [];
  const allKeys = [];
  const keySet = new Set();
  for (const rec of records) {
    const flat = {};
    let nestedItems = null;
    for (const [k, v] of Object.entries(rec)) {
      if (Array.isArray(v) && v.length && typeof v[0] === 'object') { nestedItems = v; }
      else { flat[k] = v; if (!keySet.has(k)) { keySet.add(k); allKeys.push(k); } }
    }
    if (nestedItems && nestedItems.length) {
      for (const item of nestedItems) {
        const row = { ...flat };
        for (const [k, v] of Object.entries(item)) {
          row[k] = v;
          if (!keySet.has(k)) { keySet.add(k); allKeys.push(k); }
        }
        flatRecords.push(row);
      }
    } else {
      flatRecords.push(flat);
    }
  }
  return { flatRecords, allKeys };
}

function renderTextResults(textData) {
  const combined = textData.map(r => {
    const header = textData.length > 1 ? '=== ' + (r._source_file || 'document') + ' ===\n\n' : '';
    return header + (r.text || '');
  }).join('\n\n');

  let html = '<pre style="background:var(--surface-2); border:1px solid var(--border); border-radius:6px; ' +
    'padding:1rem; font-size:0.82rem; color:var(--text); max-height:500px; overflow:auto; white-space:pre-wrap; ' +
    'word-wrap:break-word;">' + combined.replace(/</g, '&lt;') + '</pre>';

  const txtBlob = new Blob([combined], { type: 'text/plain' });
  const txtUrl = URL.createObjectURL(txtBlob);
  html += '<a class="download-btn" href="' + txtUrl + '" download="' + extractedFilename('txt') + '">Download Text</a>';

  results.innerHTML = html;
}

function renderSingleResult(data) {
  const keys = Object.keys(data).filter(k => !k.startsWith('_'));
  let html = '<div class="table-wrap"><table class="results"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>';
  for (const k of keys) {
    const v = data[k];
    const display = v != null ? String(v).replace(/</g, '&lt;') : '';
    html += '<tr><td style="font-weight:500; white-space:nowrap;">' + k + '</td><td>' + display + '</td></tr>';
  }
  html += '</tbody></table></div>';

  const jsonBlob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const jsonUrl = URL.createObjectURL(jsonBlob);
  html += '<a class="download-btn" href="' + jsonUrl + '" download="' + extractedFilename('json') + '">Download JSON</a>';

  results.innerHTML = html;
}

function renderTablePreview(records) {
  const PREVIEW_ROWS = 5;
  const { flatRecords, allKeys } = flattenRecords(records);
  const preview = flatRecords.slice(0, PREVIEW_ROWS);

  let html = '<p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:0.5rem;">' + records.length + ' records — showing first ' + PREVIEW_ROWS + '</p>';
  html += '<div class="table-wrap"><table class="results"><thead><tr>';
  for (const k of allKeys) html += '<th>' + k + '</th>';
  html += '</tr></thead><tbody>';
  for (const row of preview) {
    html += '<tr>';
    for (const k of allKeys) {
      const v = row[k];
      html += '<td>' + (v != null ? String(v).replace(/</g,'&lt;') : '') + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  const csvRows = [allKeys.join(',')];
  for (const row of flatRecords) {
    csvRows.push(allKeys.map(k => {
      const s = row[k] != null ? String(row[k]) : '';
      return s.includes(',') || s.includes('"') || s.includes('\n')
        ? '"' + s.replace(/"/g, '""') + '"' : s;
    }).join(','));
  }
  const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  html += '<a class="download-btn" href="' + url + '" download="' + extractedFilename('csv') + '">Download CSV</a>';

  const jsonBlob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
  const jsonUrl = URL.createObjectURL(jsonBlob);
  html += '<a class="download-btn" href="' + jsonUrl + '" download="' + extractedFilename('json') + '">Download JSON</a>';

  const schemaSpec = buildSpec();
  const schemaYaml = specToYaml(schemaSpec);
  const schemaBlob = new Blob([schemaYaml], { type: 'text/yaml' });
  const schemaUrl = URL.createObjectURL(schemaBlob);
  const schemaFilename = (schemaSpec.name || 'schema').toLowerCase().replace(/\s+/g, '_') + '.yaml';
  html += '<a class="download-btn" href="' + schemaUrl + '" download="' + schemaFilename + '">Download Schema</a>';

  results.innerHTML = html;
}

function renderTable(records) {
  if (!records.length) { results.textContent = 'No records found.'; return; }

  const { flatRecords, allKeys } = flattenRecords(records);
  let sortCol = null, sortAsc = true;

  function buildTable() {
    const sorted = [...flatRecords];
    if (sortCol !== null) {
      sorted.sort((a, b) => {
        const va = a[sortCol], vb = b[sortCol];
        if (va == null && vb == null) return 0;
        if (va == null) return 1;
        if (vb == null) return -1;
        const na = Number(va), nb = Number(vb);
        if (!isNaN(na) && !isNaN(nb)) return sortAsc ? na - nb : nb - na;
        return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
      });
    }

    let html = '<div class="table-wrap"><table class="results"><thead><tr>';
    for (const k of allKeys) {
      const arrow = sortCol === k ? (sortAsc ? ' \u25B2' : ' \u25BC') : '';
      html += '<th style="cursor:pointer; user-select:none;" data-col="' + k + '">' + k + arrow + '</th>';
    }
    html += '</tr></thead><tbody>';
    for (const row of sorted) {
      html += '<tr>';
      for (const k of allKeys) {
        const v = row[k];
        html += '<td>' + (v != null ? String(v).replace(/</g,'&lt;') : '') + '</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    return html;
  }

  function render() {
    let html = buildTable();

    const csvRows = [allKeys.join(',')];
    for (const row of flatRecords) {
      csvRows.push(allKeys.map(k => {
        const s = row[k] != null ? String(row[k]) : '';
        return s.includes(',') || s.includes('"') || s.includes('\n')
          ? '"' + s.replace(/"/g, '""') + '"' : s;
      }).join(','));
    }
    const blob = new Blob([csvRows.join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    html += '<a class="download-btn" href="' + url + '" download="' + extractedFilename('csv') + '">Download CSV</a>';

    const jsonBlob = new Blob([JSON.stringify(records, null, 2)], { type: 'application/json' });
    const jsonUrl = URL.createObjectURL(jsonBlob);
    html += '<a class="download-btn" href="' + jsonUrl + '" download="' + extractedFilename('json') + '">Download JSON</a>';

    const schemaSpec = buildSpec();
    const schemaYaml = specToYaml(schemaSpec);
    const schemaBlob = new Blob([schemaYaml], { type: 'text/yaml' });
    const schemaUrl = URL.createObjectURL(schemaBlob);
    const schemaFilename = (schemaSpec.name || 'schema').toLowerCase().replace(/\s+/g, '_') + '.yaml';
    html += '<a class="download-btn" href="' + schemaUrl + '" download="' + schemaFilename + '">Download Schema</a>';

    results.innerHTML = html;

    // Wire up sort click handlers
    results.querySelectorAll('th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) { sortAsc = !sortAsc; }
        else { sortCol = col; sortAsc = true; }
        render();
      });
    });
  }

  render();
}

// Download schema as YAML
function specToYaml(spec) {
  function yamlStr(s) {
    if (s.includes('\n') || s.includes(':') || s.includes('#') || s.includes("'"))
      return '"' + s.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
    return s;
  }
  let y = '';
  if (spec.name) {
    const cleanName = spec.name.replace(/\.ya?ml$/i, '');
    y += 'name: ' + yamlStr(cleanName) + '\n';
  }
  if (spec.mode) y += 'mode: ' + spec.mode + '\n';
  if (spec.instructions) y += 'instructions: ' + yamlStr(spec.instructions) + '\n';
  y += '\nfields:\n';
  for (const [name, cfg] of Object.entries(spec.fields)) {
    y += '  ' + yamlStr(name) + ':\n';
    y += '    type: ' + cfg.type + '\n';
    if (cfg.description) y += '    description: ' + yamlStr(cfg.description) + '\n';
    if (cfg.values && cfg.values.length) y += '    values: [' + cfg.values.join(', ') + ']\n';
    y += '\n';
  }
  return y.trimEnd() + '\n';
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const spec = buildSpec();
  if (!Object.keys(spec.fields).length) { alert('Add at least one field.'); return; }
  if (!spec.name) {
    const name = prompt('Schema name:');
    if (!name) return;
    spec.name = name;
    document.getElementById('schemaName').value = name;
  }
  const yaml = specToYaml(spec);
  const filename = spec.name.toLowerCase().replace(/\s+/g, '_') + '.yaml';
  const blob = new Blob([yaml], { type: 'text/yaml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  st.textContent = 'Downloaded ' + filename;
});

// Preview Schema — show YAML of current schema in a modal-like area
document.getElementById('previewSchema').addEventListener('click', () => {
  const spec = buildSpec();
  if (!Object.keys(spec.fields || {}).length) {
    alert('Add at least one field first.');
    return;
  }
  const yaml = specToYaml(spec);
  const existing = document.getElementById('schemaPreview');
  if (existing) { existing.remove(); return; } // toggle off
  const div = document.createElement('div');
  div.id = 'schemaPreview';
  div.style.cssText = 'margin-top:0.5rem;';
  div.innerHTML = '<pre style="font-size:0.74rem; margin:0;">' + yaml.replace(/</g, '&lt;') + '</pre>';
  document.getElementById('previewSchema').closest('.card').appendChild(div);
});

// Restore saved state, or start with one empty field
if (!restoreState()) {
  fields.push({ name: '', type: 'string', description: '', values: '', enabled: true });
}
renderFields();

// Save on schema name / parser / ocr changes
document.getElementById('schemaName').addEventListener('input', saveState);
document.getElementById('parserSelect').addEventListener('change', saveState);

// Load settings from URL params (e.g. from Runs page "Load settings")
(function loadFromUrl() {
  const params = new URLSearchParams(window.location.search);
  if (!params.has('run') && !params.has('schema')) return;

  if (params.has('schema')) {
    try {
      const spec = JSON.parse(params.get('schema'));
      document.getElementById('schemaName').value = spec.name || '';
      if (spec.mode === 'table') { recordType = 'table'; updateModeToggle(); }
      if (spec.header_pages) document.getElementById('headerPages').value = spec.header_pages;
      if (spec.pages) document.getElementById('pageRange').value = spec.pages;
      fields = Object.entries(spec.fields || {}).map(([name, cfg]) => ({
        name, type: cfg.type || 'string', description: cfg.description || '',
        values: (cfg.values || []).join(', '), enabled: true,
      }));
      renderFields();
    } catch (_) {}
  }
  if (params.has('instructions')) {
    document.getElementById('instructions').value = params.get('instructions');
  }
  // Clean URL without reload
  window.history.replaceState({}, '', '/');
})();
</script>
