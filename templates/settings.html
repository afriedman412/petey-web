<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Settings — Petey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #111111;
  --surface:    #1c1c1c;
  --surface-2:  #262626;
  --border:     #333333;
  --accent:     #d8572a;
  --accent-h:   #e06b3e;
  --accent-dim: rgba(216,87,42,0.12);
  --amber:      #f7b538;
  --amber-dim:  rgba(247,181,56,0.12);
  --green:      #86efac;
  --danger:     #c32f27;
  --text:       #f2ece4;
  --text-muted: #db7c26;
  --text-dim:   #999999;
  --r:          8px;
  --r-lg:       12px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* PAGE TOP LINK */
.page-top-link {
  font-size: 0.78rem; color: var(--text-muted); text-decoration: none;
  letter-spacing: 0.03em; transition: color 0.15s; align-self: flex-end;
  padding-bottom: 0.2rem;
}
.page-top-link:hover { color: var(--text); }

/* AUTH OVERLAY */
.auth-overlay {
  position: fixed; inset: 0; background: rgba(11,15,26,0.97);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; flex-direction: column; gap: 1.25rem;
}
.auth-overlay h2 {
  font-size: 2.8rem; font-weight: 800; letter-spacing: -0.05em; line-height: 1;
}
.auth-overlay p { color: var(--text-muted); font-size: 0.88rem; }
.auth-overlay .overlay-btn {
  padding: 11px 28px; font-size: 0.9rem; font-weight: 700; border-radius: 8px;
  border: none; background: var(--accent); color: #000; cursor: pointer;
  font-family: inherit; transition: background 0.15s;
}
.auth-overlay .overlay-btn:hover { background: var(--accent-h); }

/* MAIN */
.main { max-width: 600px; margin: 0 auto; padding: 2.75rem 2rem 5rem; }

/* PAGE HEADER */
.page-header { margin-bottom: 2.25rem; }
.page-header h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 2.4rem; font-weight: 400; letter-spacing: -0.01em; line-height: 1;
}

/* CARD */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 1.5rem 1.75rem; margin-bottom: 1.25rem;
}
.card-header {
  padding-bottom: 0.85rem; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border);
}
.card-label {
  font-size: 0.67rem; font-weight: 700; letter-spacing: 0.13em;
  text-transform: uppercase; color: var(--text-muted);
}

/* FIELD */
.field { margin-bottom: 1.1rem; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted);
  margin-bottom: 0.35rem; letter-spacing: 0.02em;
}
.field .hint { font-size: 0.72rem; color: var(--text-dim); margin-top: 0.25rem; }

/* INPUTS */
select, input[type="text"], input[type="password"] {
  width: 100%; padding: 0.45rem 0.6rem; background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 5px;
  font-size: 0.83rem; font-family: inherit; color: var(--text);
  transition: border-color 0.15s;
}
select:focus, input:focus { outline: none; border-color: var(--accent); }
select option { background: var(--surface-2); color: var(--text); }
input::placeholder { color: var(--text-dim); }

/* KEY ROW */
.key-row { display: flex; gap: 0.5rem; }
.key-row input { flex: 1; }
.key-row button {
  padding: 0.45rem 0.85rem; border: 1px solid var(--border); border-radius: 5px;
  background: var(--surface-2); color: var(--text-muted); cursor: pointer;
  font-size: 0.75rem; font-family: inherit; white-space: nowrap; transition: all 0.15s;
}
.key-row button:hover { border-color: var(--text-muted); color: var(--text); }

.validate-btn {
  padding: 0.45rem 0.85rem; border: 1px solid var(--border); border-radius: 5px;
  background: var(--surface-2); color: var(--text-muted); cursor: pointer;
  font-size: 0.75rem; font-family: inherit; white-space: nowrap; transition: all 0.15s;
}
.validate-btn:hover { border-color: var(--accent); color: var(--accent); }

.key-status { font-size: 0.72rem; margin-top: 0.3rem; }
.key-status.valid { color: var(--green); }
.key-status.invalid { color: var(--danger); }

/* SAVE BUTTON */
.save-btn {
  padding: 0.65rem 1.75rem; font-size: 0.88rem; font-weight: 700;
  background: var(--accent); color: #000; border: none;
  border-radius: 6px; cursor: pointer; font-family: inherit;
  letter-spacing: 0.03em; transition: background 0.15s; margin-top: 0.5rem;
}
.save-btn:hover { background: var(--accent-h); }
.save-btn:disabled { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); cursor: default; }

/* STATUS */
.status { margin-top: 0.75rem; font-size: 0.82rem; }
.status.ok { color: var(--green); }
.status.err { color: var(--danger); }

/* API KEY INFO BANNER */
.info-banner {
  font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1rem;
  padding: 0.6rem 0.75rem; background: var(--surface-2); border-radius: 5px;
  border-left: 2px solid var(--border);
}
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <h2>Petey<span style="color:var(--accent)">.</span></h2>
  <p>Sign in to manage settings</p>
  <button id="overlaySignIn" class="overlay-btn">Sign in with Google</button>
</div>

<main class="main">

  <div class="page-header">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:0.5rem;">
      <h1>Settings<span style="color:var(--accent)">.</span></h1>
      <div style="display:flex; gap:1.25rem; align-items:flex-end;">
        <a class="page-top-link" href="/">Extractor</a>
        <a class="page-top-link" href="/about">About</a>
        <a class="page-top-link" href="/template-builder">Schema Designer</a>
        <a href="https://github.com/afriedman412/petey" target="_blank" rel="noopener" class="page-top-link" title="GitHub" style="padding-bottom:0;"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-label">Model</span>
    </div>
    <div class="field">
      <label for="model">Extraction model</label>
      <select id="model"></select>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-label">API Keys</span>
    </div>
    <div class="info-banner">
      Keys are stored securely per-user and never returned in full. Leave a field unchanged to keep the existing key.
    </div>

    <div class="field">
      <label for="openai_key">OpenAI API Key</label>
      <div class="key-row">
        <input type="password" id="openai_key" placeholder="sk-..." autocomplete="off">
        <button type="button" id="toggleOpenai">Show</button>
        <button type="button" class="validate-btn" id="validateOpenai">Validate</button>
      </div>
      <div class="hint">Required for GPT models</div>
      <div class="key-status" id="openaiKeyStatus"></div>
    </div>

    <div class="field">
      <label for="anthropic_key">Anthropic API Key</label>
      <div class="key-row">
        <input type="password" id="anthropic_key" placeholder="sk-ant-..." autocomplete="off">
        <button type="button" id="toggleAnthropic">Show</button>
        <button type="button" class="validate-btn" id="validateAnthropic">Validate</button>
      </div>
      <div class="hint">Required for Claude models</div>
      <div class="key-status" id="anthropicKeyStatus"></div>
    </div>

    <div class="field">
      <label for="mistral_key">Mistral API Key</label>
      <div class="key-row">
        <input type="password" id="mistral_key" placeholder="..." autocomplete="off">
        <button type="button" id="toggleMistral">Show</button>
      </div>
      <div class="hint">Required for Mistral OCR</div>
    </div>
  </div>

  <button class="save-btn" id="saveBtn">Save settings</button>
  <div class="status" id="status"></div>
  <div id="signOutArea" style="display:none; margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border);">
    <span id="userEmail" style="font-size:0.78rem; color:var(--text-muted);"></span>
    <button id="signOutBtn" style="margin-left:1rem; background:none; border:none; font-size:0.78rem; color:var(--text-muted); cursor:pointer; font-family:inherit; text-decoration:underline; text-underline-offset:3px;">Sign out</button>
  </div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getAuth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

// --- Firebase Auth ---
const cfgResp = await fetch('/firebase-config');
const firebaseConfig = await cfgResp.json();

let _currentUser = null;

if (firebaseConfig.authDisabled) {
  document.getElementById('authOverlay').style.display = 'none';
  loadSettings();
} else {
  const firebaseApp = initializeApp(firebaseConfig);
  const auth = getAuth(firebaseApp);
  const provider = new GoogleAuthProvider();

  document.getElementById('overlaySignIn').addEventListener('click', () => signInWithPopup(auth, provider));
  document.getElementById('signOutBtn').addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, user => {
    const overlay = document.getElementById('authOverlay');
    _currentUser = user;
    if (user) {
      overlay.style.display = 'none';
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('signOutArea').style.display = 'block';
      loadSettings();
    } else {
      overlay.style.display = 'flex';
      document.getElementById('signOutArea').style.display = 'none';
    }
  });
}

async function authFetch(url, opts = {}) {
  if (_currentUser) {
    const token = await _currentUser.getIdToken();
    opts.headers = { ...(opts.headers || {}), 'Authorization': 'Bearer ' + token };
  }
  return fetch(url, opts);
}

// --- Settings logic ---
const modelSelect = document.getElementById('model');
const openaiInput = document.getElementById('openai_key');
const anthropicInput = document.getElementById('anthropic_key');
const mistralInput = document.getElementById('mistral_key');
const statusEl = document.getElementById('status');

function toggleVis(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'Hide'; }
  else { inp.type = 'password'; btn.textContent = 'Show'; }
}

document.getElementById('toggleOpenai').addEventListener('click', function() {
  toggleVis('openai_key', this);
});
document.getElementById('toggleAnthropic').addEventListener('click', function() {
  toggleVis('anthropic_key', this);
});
document.getElementById('toggleMistral').addEventListener('click', function() {
  toggleVis('mistral_key', this);
});

async function loadSettings() {
  try {
    const resp = await authFetch('/settings');
    if (!resp.ok) {
      statusEl.textContent = 'Failed to load settings (status ' + resp.status + ')';
      statusEl.className = 'status err';
      return;
    }
    const data = await resp.json();

    modelSelect.innerHTML = '';
    for (const m of (data.models || [])) {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.name + ' (' + m.provider + ')';
      modelSelect.appendChild(opt);
    }
    modelSelect.value = data.model;

    openaiInput.value = data.openai_api_key || '';
    openaiInput.placeholder = data.openai_api_key ? data.openai_api_key : 'sk-...';

    anthropicInput.value = data.anthropic_api_key || '';
    anthropicInput.placeholder = data.anthropic_api_key ? data.anthropic_api_key : 'sk-ant-...';

    mistralInput.value = data.mistral_api_key || '';
    mistralInput.placeholder = data.mistral_api_key ? data.mistral_api_key : '...';

  } catch (e) {
    statusEl.textContent = 'Error loading settings: ' + e.message;
    statusEl.className = 'status err';
  }
}

document.getElementById('saveBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  statusEl.textContent = '';

  const body = { model: modelSelect.value };
  if (openaiInput.value && !openaiInput.value.includes('...')) {
    body.openai_api_key = openaiInput.value;
  }
  if (anthropicInput.value && !anthropicInput.value.includes('...')) {
    body.anthropic_api_key = anthropicInput.value;
  }
  if (mistralInput.value && !mistralInput.value.includes('...')) {
    body.mistral_api_key = mistralInput.value;
  }

  try {
    const resp = await authFetch('/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error('Save failed');
    const data = await resp.json();
    openaiInput.value = data.openai_api_key || '';
    anthropicInput.value = data.anthropic_api_key || '';
    mistralInput.value = data.mistral_api_key || '';
    statusEl.className = 'status ok';
    statusEl.textContent = 'Settings saved.';
  } catch (e) {
    statusEl.className = 'status err';
    statusEl.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
});

// --- Key validation ---
async function validateKey(providerName, inputEl, statusElId) {
  const key = inputEl.value;
  const el = document.getElementById(statusElId);
  if (!key || key.includes('...')) {
    el.textContent = 'Enter a full key to validate.';
    el.className = 'key-status invalid';
    return;
  }
  el.textContent = 'Validating...';
  el.className = 'key-status';
  try {
    const resp = await authFetch('/validate-key', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider: providerName, key }),
    });
    const data = await resp.json();
    if (data.valid) {
      el.textContent = data.message;
      el.className = 'key-status valid';
    } else {
      el.textContent = data.message || 'Invalid key';
      el.className = 'key-status invalid';
    }
  } catch (e) {
    el.textContent = 'Validation error: ' + e.message;
    el.className = 'key-status invalid';
  }
}

document.getElementById('validateOpenai').addEventListener('click', () => {
  validateKey('openai', openaiInput, 'openaiKeyStatus');
});
document.getElementById('validateAnthropic').addEventListener('click', () => {
  validateKey('anthropic', anthropicInput, 'anthropicKeyStatus');
});
</script>
</body>
</html>
