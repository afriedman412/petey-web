name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'docker-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          if [[ "$GITHUB_REF" == refs/tags/docker-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/docker-v}"
            echo "tags=afriedman412/petey:${VERSION},afriedman412/petey:latest" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            echo "tags=afriedman412/petey:main-${SHORT_SHA},afriedman412/petey:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=afriedman412/petey:latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: afriedman412
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.standalone
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: afriedman412
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: afriedman412/petey
          readme-filepath: ./README.md
